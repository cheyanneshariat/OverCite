<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OverCite Settings</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-soft: #f2f5f8;
        --ink: #18212c;
        --muted: #647386;
        --label: #111827;
        --accent: #b84f35;
        --accent-2: #285f8f;
        --border: #d9e0e8;
        --section-bg: rgba(184, 79, 53, 0.11);
        --section-border: rgba(184, 79, 53, 0.28);
        --shadow: 0 18px 48px rgba(24, 33, 44, 0.12);
        --field-bg: #ffffff;
        --field-ink: #1f2a36;
        --field-placeholder: #738097;
        --field-focus: rgba(184, 79, 53, 0.24);
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
        --bg: #0f141b;
        --panel: #171e27;
        --panel-soft: #111821;
        --ink: #f4f6f8;
        --muted: #aeb9c7;
        --label: #ffffff;
        --accent: #e28661;
        --accent-2: #8fbde8;
        --border: #2d3948;
        --section-bg: rgba(226, 134, 97, 0.13);
        --section-border: rgba(226, 134, 97, 0.34);
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
        --field-bg: #0f151d;
        --field-ink: #f3f7fb;
        --field-placeholder: #98a6b8;
        --field-focus: rgba(226, 134, 97, 0.32);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 24px 64px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2.4rem, 6vw, 4.5rem);
        line-height: 0.9;
        letter-spacing: 0;
        font-weight: 780;
      }

      .lede {
        margin: 0 0 26px;
        font-size: 1.12rem;
        line-height: 1.45;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 22px;
        padding: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      label,
      .field {
        display: grid;
        gap: 7px;
      }

      .section {
        display: grid;
        gap: 16px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }

      .section:first-of-type {
        padding-top: 0;
        border-top: 0;
      }

      h2 {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        gap: 8px;
        margin: 0;
        padding: 6px 10px;
        color: var(--accent);
        background: var(--section-bg);
        border: 1px solid var(--section-border);
        border-radius: 8px;
        font-size: 0.92rem;
        line-height: 1.2;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 800;
      }

      .label-text {
        color: var(--label);
        font-size: 1rem;
        line-height: 1.25;
        font-weight: 760;
      }

      .hint {
        font-weight: 400;
        color: var(--muted);
        font-size: 0.93rem;
        line-height: 1.45;
      }

      input:not([type="checkbox"]),
      textarea,
      select {
        width: 100%;
        padding: 12px 13px;
        font: inherit;
        font-weight: 620;
        color: var(--field-ink);
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--field-bg);
        appearance: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--field-placeholder);
      }

      input:not([type="checkbox"]):focus,
      textarea:focus,
      select:focus {
        outline: 2px solid var(--field-focus);
        outline-offset: 2px;
      }

      select option {
        color: var(--field-ink);
        background: var(--field-bg);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .preset-summary {
        margin-top: -8px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 0.93rem;
        line-height: 1.45;
      }

      .field-example {
        width: fit-content;
        max-width: 100%;
        padding: 6px 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel-soft);
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.35;
      }

      details {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel-soft);
      }

      summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 14px;
        color: var(--label);
        cursor: pointer;
        font-weight: 760;
        list-style: none;
      }

      summary::-webkit-details-marker {
        display: none;
      }

      summary::after {
        content: "+";
        color: var(--accent);
        font-size: 1.1rem;
        font-weight: 800;
      }

      details[open] summary::after {
        content: "-";
      }

      .advanced-body {
        display: grid;
        gap: 16px;
        padding: 0 14px 16px;
      }

      .source-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 10px 14px;
      }

      .source-option {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: start;
        gap: 9px;
        color: var(--label);
        font-weight: 700;
      }

      .source-option input {
        inline-size: 18px;
        block-size: 18px;
        margin-top: 2px;
        accent-color: var(--accent);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 11px 16px;
        font: inherit;
        font-weight: 700;
        color: white;
        background: var(--accent);
        cursor: pointer;
      }

      #status {
        color: var(--accent-2);
        font-weight: 700;
        min-height: 1.4rem;
      }

      .footer-note {
        margin: 16px 4px 0;
        color: var(--muted);
        font-size: 0.94rem;
      }

      .footer-note a {
        color: inherit;
      }

      code {
        font-family: "SFMono-Regular", "Menlo", "Consolas", monospace;
        font-size: 0.92em;
        color: var(--field-ink);
      }

      @media (max-width: 640px) {
        main {
          padding: 30px 14px 44px;
        }

        form {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>OverCite</h1>
      <p class="lede">
        Customize for your research area and preferences.
      </p>
      <form id="settings-form">
        <section class="section">
          <h2>Search</h2>
          <label class="field">
            <span class="label-text">Search coverage</span>
            <span class="hint">Choose which databases OverCite searches.</span>
            <select id="source-profile" name="sourceProfile">
              <option value="astrophysics">Astrophysics</option>
              <option value="physics">Physics</option>
              <option value="math">Math</option>
              <option value="computer-science">Computer Science</option>
              <option value="life-sciences">Biology / Medicine</option>
              <option value="chemistry">Chemistry</option>
              <option value="general">General / DOI</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <div class="preset-summary" id="source-profile-summary" aria-live="polite"></div>
          <details>
            <summary>Advanced source order</summary>
            <div class="advanced-body">
              <label class="field">
                <span class="label-text">Search first</span>
                <span class="hint">If this returns a strong match, OverCite stops here.</span>
                <select id="primary-source" name="primarySource">
                  <option value="ads">ADS/SciX</option>
                  <option value="pubmed">PubMed</option>
                  <option value="crossref">Crossref / DOI</option>
                  <option value="arxiv">arXiv</option>
                  <option value="inspire">INSPIRE</option>
                  <option value="datacite">DataCite</option>
                </select>
              </label>
              <label class="field">
                <span class="label-text">Try if needed</span>
                <span class="hint">1 database is usually enough. Add 1-2 backups only for cross-field work.</span>
                <div class="source-grid" id="fallback-sources">
                  <label class="source-option"><input type="checkbox" name="fallbackSources" value="ads">ADS/SciX</label>
                  <label class="source-option"><input type="checkbox" name="fallbackSources" value="pubmed">PubMed</label>
                  <label class="source-option"><input type="checkbox" name="fallbackSources" value="crossref">Crossref / DOI</label>
                  <label class="source-option"><input type="checkbox" name="fallbackSources" value="arxiv">arXiv</label>
                  <label class="source-option"><input type="checkbox" name="fallbackSources" value="inspire">INSPIRE</label>
                  <label class="source-option"><input type="checkbox" name="fallbackSources" value="datacite">DataCite</label>
                </div>
              </label>
            </div>
          </details>
        </section>
        <section class="section">
          <h2>API keys</h2>
          <label class="field">
            <span class="label-text">ADS/SciX token</span>
            <span class="hint">Needed for ADS/SciX results.</span>
            <input id="ads-api-token" name="adsApiToken" type="password" autocomplete="off" spellcheck="false">
          </label>
          <label class="field">
            <span class="label-text">NCBI key</span>
            <span class="hint">Optional. Improves PubMed rate limits.</span>
            <input id="ncbi-api-token" name="ncbiApiToken" type="password" autocomplete="off" spellcheck="false">
          </label>
        </section>
        <section class="section">
          <h2>Appearance</h2>
          <label class="field">
          <span class="label-text">Theme</span>
          <span class="hint">Used here and in the Overleaf popup.</span>
          <select id="theme-mode" name="themeMode">
            <option value="auto">Auto</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        </section>
        <section class="section">
          <h2>Citations</h2>
        <label class="field">
          <span class="label-text">Citation key style</span>
          <span class="hint">Choose short author-year keys, richer keys, bibcodes, or the key you typed.</span>
          <select id="citation-key-mode" name="citationKeyMode">
            <option value="authoryear">Author + Full Year</option>
            <option value="authoryear-underscore">Author_Year</option>
            <option value="authoryear-colon">Author:Year</option>
            <option value="informative">Informative</option>
            <option value="bibcode">Bibcode</option>
            <option value="typed">Keep Typed Key</option>
          </select>
          <span class="field-example" id="citation-key-example">Example: Shariat2025</span>
        </label>
        <label class="field">
          <span class="label-text">Bibliography order</span>
          <span class="hint">Append new entries or keep the bibliography sorted.</span>
          <select id="bibliography-insert-mode" name="bibliographyInsertMode">
            <option value="append">Append at end</option>
            <option value="alphabetical">Insert alphabetically</option>
          </select>
        </label>
        <label class="field">
          <span class="label-text">Default search mode</span>
          <span class="hint">Contextual is best for normal citation keys. Simple search and raw query stay available in the popup.</span>
          <select id="default-search-mode" name="defaultSearchMode">
            <option value="contextual">Contextual</option>
            <option value="simple">Simple search</option>
            <option value="direct">Raw query</option>
          </select>
        </label>
        </section>
        <section class="section">
          <h2>Project</h2>
        <label class="field">
          <span class="label-text">Context window</span>
          <span class="hint">Recommended: <code>400</code>-<code>600</code> characters. Default: <code>500</code>.</span>
          <input id="context-window-chars" name="contextWindowChars" type="number" min="200" max="1200" step="50" value="500" placeholder="500">
        </label>
        <label class="field">
          <span class="label-text">Project bib file</span>
          <span class="hint">Optional. Map an Overleaf project id from the project URL to the <code>.bib</code> file OverCite should use.</span>
          <textarea id="project-overrides" name="defaultProjectBibFileOverride" spellcheck="false" placeholder='{"project-id":"references.bib"}'></textarea>
          <span class="field-example">Example: <code>{"69c405a0":"references.bib"}</code></span>
        </label>
        </section>
        <div class="actions">
          <button type="submit">Save settings</button>
          <div id="status" aria-live="polite"></div>
        </div>
      </form>
      <p class="footer-note">
        More info and installation notes: <a href="https://github.com/cheyanneshariat/OverCite" target="_blank" rel="noreferrer">GitHub</a>
      </p>
    </main>
    <script type="module" src="src/options.js"></script>
  </body>
  </html>
