    fill="#f4efe7">{</text>

  <text
    x="348"
    y="274"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="238"
    font-weight="700"
    fill="#f4efe7">}</text>

  <polygon
    points="256,132 281,207 360,207 296,252 321,328 256,281 191,328 216,252 152,207 231,207"
    fill="#f18a62"
  />
  <polygon
    points="256,167 272,214 322,214 281,243 297,291 256,262 215,291 231,243 190,214 240,214"
    fill="#ffd39c"
  />
</svg>
