<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">OverCite logo</title>
  <desc id="desc">Curly braces around a star, inspired by BibTeX and astronomy.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#132033"/>
      <stop offset="100%" stop-color="#1f2f47"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#f6d9ae" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f6d9ae" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="232" r="130" fill="url(#glow)"/>

  <text
    x="178"
    y="258"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="222"
    font-weight="700"
    fill="#f4efe7">{</text>

  <text
    x="334"
    y="258"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="222"
    font-weight="700"
    fill="#f4efe7">}</text>

  <polygon
    points="256,154 276,213 338,213 288,248 308,308 256,271 204,308 224,248 174,213 236,213"
    fill="#f18a62"
  />
  <polygon
    points="256,181 269,220 311,220 277,244 290,286 256,262 222,286 235,244 201,220 243,220"
    fill="#ffd39c"
  />
</svg>
